<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>한국 뷰티 브랜드 검색기</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efea;
    --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0;
    --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
    --info-bg: #e6f1fb; --info-text: #0c447c;
    --radius-md: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e; --bg2: #2a2a2a; --bg3: #333333;
      --text: #f0f0f0; --text2: #aaaaaa; --text3: #666666;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --info-bg: #0c2a44; --info-text: #85b7eb;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
  .page { max-width: 760px; margin: 0 auto; }
  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text2); }
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-row input { flex: 1; padding: 10px 14px; font-size: 14px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-md); color: var(--text); outline: none; }
  .search-row input:focus { border-color: #378add; }
  button { padding: 10px 18px; font-size: 13px; cursor: pointer; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-md); color: var(--text); transition: background 0.15s; }
  button:hover { background: var(--bg2); }
  .cat-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .cat-btn { font-size: 12px; padding: 5px 13px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s; }
  .cat-btn.on { background: var(--bg); color: var(--text); border-color: var(--border2); }
  .count { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .card:hover { border-color: var(--border2); }
  .card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .card-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .card-name { font-size: 14px; font-weight: 500; }
  .card-en { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
  .tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
  .tag { font-size: 11px; padding: 2px 7px; border-radius: 10px; background: var(--bg2); color: var(--text2); }
  .card-btn { width: 100%; padding: 7px; font-size: 12px; border: 0.5px solid var(--border2); border-radius: var(--radius-md); background: transparent; color: var(--text); cursor: pointer; }
  .card-btn:hover { background: var(--bg2); }
  .empty { text-align: center; padding: 3rem; color: var(--text3); grid-column: 1/-1; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .overlay.open { display: flex; }
  .modal { background: var(--bg); border-radius: var(--radius-lg); border: 0.5px solid var(--border2); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
  .modal-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; }
  .modal-brand { display: flex; align-items: center; gap: 12px; }
  .modal-icon { width: 46px; height: 46px; border-radius: 10px; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .modal-title { font-size: 17px; font-weight: 600; }
  .modal-en { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text2); padding: 2px 6px; }
  .modal-url { display: inline-block; font-size: 12px; color: var(--info-text); margin-bottom: 1.25rem; word-break: break-all; text-decoration: none; }
  .modal-url:hover { text-decoration: underline; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 8px; }
  .prods { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
  .prod { background: var(--bg2); border-radius: var(--radius-md); padding: 12px 14px; }
  .prod-name { font-size: 13px; font-weight: 500; margin-bottom: 5px; }
  .prod-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
  .prod-meta span { font-size: 11px; padding: 2px 7px; background: var(--bg); border: 0.5px solid var(--border); border-radius: 6px; color: var(--text2); }
  .prod-point { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .ai-box { background: var(--bg2); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 1.25rem; }
  .ai-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; }
  .ai-text { font-size: 13px; color: var(--text); line-height: 1.7; }
  .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .modal-actions button { font-size: 13px; }
  .modal-actions .primary { background: var(--info-bg); color: var(--info-text); border-color: transparent; }
  .custom-box { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-top: 1.25rem; }
  .custom-box p { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .custom-row { display: flex; gap: 6px; }
  .custom-row input { flex: 1; padding: 9px 12px; font-size: 13px; background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius-md); color: var(--text); outline: none; }
  footer { margin-top: 2rem; text-align: center; font-size: 12px; color: var(--text3); }
  .api-notice { background: #faeeda; border: 0.5px solid #ba7517; border-radius: var(--radius-md); padding: 10px 14px; font-size: 12px; color: #633806; margin-bottom: 1rem; display: none; }
</style>
</head>
<body>
<div class="page">
  <header>
    <h1>🇰🇷 한국 뷰티 브랜드 검색기</h1>
    <p>브랜드를 선택하면 주요 제품 정보와 AI 분석을 확인할 수 있습니다</p>
  </header>
  <div class="api-notice" id="apiNotice">
    ⚠️ AI 분석 기능을 사용하려면 Anthropic API 키가 필요합니다.
    <a href="https://console.anthropic.com" target="_blank" style="color:#854f0b;">console.anthropic.com</a>에서 발급 후 아래 입력란에 붙여넣으세요.
  </div>
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <input type="password" id="apiKey" placeholder="Anthropic API 키 입력 (sk-ant-...)" style="flex:1;padding:9px 12px;font-size:13px;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-md);color:var(--text);outline:none;" />
    <button onclick="saveKey()">저장</button>
  </div>
  <div id="keyStatus" style="font-size:12px;color:var(--text3);margin-bottom:12px;"></div>
  <div class="search-row">
    <input type="text" id="q" placeholder="브랜드명 또는 제품 키워드 검색..." />
    <button onclick="doSearch()">검색</button>
  </div>
  <div class="cat-row" id="cats"></div>
  <div class="count" id="cnt"></div>
  <div class="grid" id="grid"></div>
  <div class="custom-box">
    <p>찾는 브랜드가 없나요? 브랜드명을 입력하면 AI가 정보를 찾아드립니다</p>
    <div class="custom-row">
      <input type="text" id="customQ" placeholder="브랜드명 입력..." />
      <button onclick="customSearch()">검색</button>
    </div>
    <div id="customResult" style="margin-top:10px;font-size:13px;color:var(--text);line-height:1.7;"></div>
  </div>
  <footer>한국 뷰티 브랜드 검색기 · Powered by Anthropic Claude API</footer>
</div>
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-brand">
        <div class="modal-icon" id="mIcon"></div>
        <div><div class="modal-title" id="mName"></div><div class="modal-en" id="mEn"></div></div>
      </div>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <a class="modal-url" id="mUrl" href="#" target="_blank"></a>
    <div class="section-label">주요 제품</div>
    <div class="prods" id="mProds"></div>
    <div class="section-label">AI 브랜드 분석</div>
    <div class="ai-box">
      <div class="ai-label">✦ AI 실시간 분석</div>
      <div class="ai-text" id="aiText">분석 중...</div>
    </div>
    <div class="modal-actions">
      <a id="mSiteLink" href="#" target="_blank"><button class="primary">공식 홈페이지 방문 →</button></a>
    </div>
  </div>
</div>

const CATS=["전체","럭셔리","스킨케어","메이크업"];
let activeCat="전체",searchQ="";
let apiKey=localStorage.getItem("beauty_api_key")||"";
function saveKey(){const v=document.getElementById("apiKey").value.trim();if(v){apiKey=v;localStorage.setItem("beauty_api_key",v);document.getElementById("keyStatus").textContent="✓ API 키가 저장되었습니다";document.getElementById("apiKey").value="";document.getElementById("apiNotice").style.display="none";}}
function renderCats(){document.getElementById("cats").innerHTML=CATS.map(c=>`<button class="cat-btn${c===activeCat?" on":""}" onclick="setCat('${c}')">${c}</button>`).join("");}
function setCat(c){activeCat=c;renderCats();render();}
function getList(){let list=DB;if(activeCat!=="전체")list=list.filter(b=>b.cat===activeCat);if(searchQ.trim()){const q=searchQ.trim().toLowerCase();list=list.filter(b=>b.name.toLowerCase().includes(q)||b.en.toLowerCase().includes(q)||b.tags.some(t=>t.includes(q))||b.desc.includes(q)||b.products.some(p=>p.name.toLowerCase().includes(q)));}return list;}
function render(){const list=getList();document.getElementById("cnt").textContent=list.length?`브랜드 ${list.length}개`:"";const g=document.getElementById("grid");if(!list.length){g.innerHTML=`<div class="empty">검색 결과가 없습니다.</div>`;return;}g.innerHTML=list.map(b=>`<div class="card" onclick="openModal('${b.name}')"><div class="card-top"><div class="card-icon">${b.icon}</div><div><div class="card-name">${b.name}</div><div class="card-en">${b.en}</div></div></div><div class="card-desc">${b.desc}</div><div class="tags">${b.tags.map(t=>`<span class="tag">${t}</span>`).join("")}</div><button class="card-btn">제품 상세 보기 →</button></div>`).join("");}
function doSearch(){searchQ=document.getElementById("q").value;render();}
async function openModal(name){const b=DB.find(x=>x.name===name);if(!b)return;document.getElementById("mIcon").textContent=b.icon;document.getElementById("mName").textContent=b.name;document.getElementById("mEn").textContent=b.en;document.getElementById("mUrl").textContent=b.url;document.getElementById("mUrl").href=b.url;document.getElementById("mSiteLink").href=b.url;document.getElementById("mProds").innerHTML=b.products.map(p=>`<div class="prod"><div class="prod-name">${p.name}</div><div class="prod-meta"><span>${p.price}</span><span>${p.vol}</span></div><div class="prod-point">${p.point}</div></div>`).join("");document.getElementById("aiText").textContent="분석 중...";document.getElementById("overlay").className="overlay open";document.body.style.overflow="hidden";if(!apiKey){document.getElementById("aiText").textContent="AI 분석을 사용하려면 상단에 API 키를 입력해주세요.";document.getElementById("apiNotice").style.display="block";return;}try{const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:500,system:"당신은 한국 뷰티 애널리스트입니다. 브랜드 정보를 받으면 3~4문장으로 핵심 특징, 타겟 피부 타입, 글로벌 인지도, 구매 추천 포인트를 간결하게 한국어로 분석해주세요. 마크다운 없이 plain text로만 답하세요.",messages:[{role:"user",content:`브랜드: ${b.name}(${b.en})\n설명: ${b.desc}\n태그: ${b.tags.join(", ")}\n대표 제품: ${b.products.map(p=>p.name).join(", ")}`}]})});const data=await resp.json();document.getElementById("aiText").textContent=data.content?.find(c=>c.type==="text")?.text||"분석 정보를 불러올 수 없습니다.";}catch(e){document.getElementById("aiText").textContent="AI 분석을 불러오는 중 오류가 발생했습니다.";}}
function closeModal(){document.getElementById("overlay").className="overlay";document.body.style.overflow="";}
function handleOverlayClick(e){if(e.target===document.getElementById("overlay"))closeModal();}
async function customSearch(){const q=document.getElementById("customQ").value.trim();if(!q)return;const el=document.getElementById("customResult");if(!apiKey){el.textContent="API 키를 먼저 입력해주세요.";return;}el.textContent="검색 중...";try{const resp=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:"당신은 한국 뷰티 애널리스트입니다. 브랜드 이름을 받으면 공식 홈페이지 URL, 주요 제품 3종(제품명·가격·용량·특장점), 브랜드 특징을 간결하게 한국어로 답하세요. plain text로만 답하세요.",messages:[{role:"user",content:`브랜드명: ${q}`}]})});const data=await resp.json();el.textContent=data.content?.find(c=>c.type==="text")?.text||"정보를 찾을 수 없습니다.";}catch(e){el.textContent="검색 중 오류가 발생했습니다.";}}

document.getElementById("customQ").addEventListener("keydown",e=>{if(e.key==="Enter")customSearch();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
if(apiKey)document.getElementById("keyStatus").textContent="✓ 저장된 API 키가 있습니다";
